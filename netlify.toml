[build]
command = "node generate-sitemap.js"
publish = "."
functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
from = "/sitemap.xml"
to = "/.netlify/functions/sitemap"
status = 200

[[redirects]]
from = "/cat/*"
to = "/index.html"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200


